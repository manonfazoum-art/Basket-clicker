<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Basket Clicker Final Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --orange: #FF5722; --black: #121212; --gray: #1e1e1e; --green: #2ecc71; --blue: #3498db; --yellow: #f1c40f; }
        body { margin: 0; background-color: var(--black); color: white; font-family: 'Roboto', sans-serif; overflow-x: hidden; touch-action: manipulation; }
        
        /* Écran d'Admin / Login (basé sur photo 7) */
        #login-screen { position: fixed; inset: 0; background: var(--black); display: flex; align-items: center; justify-content: center; z-index: 1000; flex-direction: column;}
        .login-box { background: var(--gray); padding: 30px; border-radius: 15px; border: 2px solid var(--gray); text-align: center; width: 85%; }
        h1.login-title { font-family: 'Bungee', cursive; color: var(--orange); margin: 0 0 25px 0; font-size: 26px; }
        input.login-input { padding: 15px; width: 90%; border-radius: 8px; border: 2px solid transparent; margin: 10px 0; font-size: 16px; background: rgba(255,255,255,0.05); color: white; }
        input.login-input:focus { border-color: white; }
        button.login-btn { background: var(--orange); border: none; color: white; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; margin-top: 15px;}
        
        /* Header & Onglets (basé sur photo 8) */
        header { background: var(--gray); padding: 10px 15px; border-bottom: 2px solid var(--orange); }
        #score-area { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;}
        #score-display { font-size: 32px; font-weight: bold; color: var(--yellow); }
        #ballon-header { width: 35px; vertical-align: middle;}
        #gps { color: #888; font-size: 12px;}
        #aps { color: var(--green); font-size: 14px; margin-top: -5px;}
        #admin-link { color: #888; font-size: 12px; }

        nav { display: flex; justify-content: space-around; background: #1a1a1a; font-size: 12px; font-weight: bold; text-transform: uppercase; border-bottom: 1px solid #333;}
        .nav-tab { padding: 15px 5px; cursor: pointer; color: #888; border-bottom: 2px solid transparent; }
        .nav-tab.active { color: var(--orange); border-bottom-color: var(--orange); }

        /* Zones de contenu */
        .page { display: none; }
        .page.active { display: block; }

        /* Page JEU (basé sur photo 8) */
        #basket-court { background: var(--gray); margin: 20px; padding: 20px; border-radius: 15px; height: 300px; display: flex; align-items: center; justify-content: center;}
        #basket-ball { width: 100px; cursor: pointer; transition: transform 0.1s; }
        #basket-ball:active { transform: scale(0.9); }

        /* Page SHOP (TIRS, TEAM, STADES) (basé sur photos 9, 10, 11) */
        .shop-container { padding: 15px; }
        .shop-item { background: var(--gray); padding: 15px; border-radius: 12px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; border: 2px solid var(--gray);}
        .item-main { display: flex; align-items: center; flex: 1;}
        .item-emoji { font-size: 24px; margin-right: 15px; width: 30px; text-align: center;}
        .item-details { flex: 1;}
        .item-name { font-weight: bold; display: block; font-size: 16px; }
        .item-gain { color: #aaa; font-size: 12px; }
        .buy-btn-container { display: flex; align-items: center; justify-content: center; width: 80px; height: 35px; border-radius: 6px; border: 2px solid var(--orange); margin-left: 10px;}
        .item-cost { font-weight: bold; font-size: 14px; text-align: center;}
        .shop-item.cant-buy { opacity: 0.5; border-color: var(--gray); }
        .shop-item.cant-buy .buy-btn-container { border-color: #555; }

        /* Page MONDIAL (basé sur photo 12) */
        #admin-panel { padding: 20px; }
        .admin-box { border: 2px solid var(--orange); border-radius: 10px; padding: 15px; margin-bottom: 15px; background: var(--gray); }
        .admin-title { font-weight: bold; color: var(--orange); text-transform: uppercase; margin-bottom: 10px; font-size: 12px;}
        .admin-row { margin-bottom: 10px;}
        select.admin-select, input.admin-input { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #444; background: #111; color: white; margin-bottom: 5px;}
        button.admin-btn { border: none; padding: 10px; border-radius: 5px; font-weight: bold; width: 100%; color: white; cursor: pointer; text-transform: uppercase;}
        .btn-green { background: var(--green); }
        .btn-blue { background: var(--blue); }
        .btn-yellow { background: var(--yellow); color: #222; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h1 class="login-title">BASKET CLICKER</h1>
        <input type="text" id="admin-user" class="login-input" value="LouisAdmin" placeholder="Pseudo Admin...">
        <input type="password" id="admin-pass" class="login-input" value="1234" placeholder="Mot de passe...">
        <button class="login-btn" onclick="startGame()">ENTRER DANS LE STADE</button>
    </div>
</div>

<header>
    <div id="score-area">
        <div>
            <div id="score-display"><span id="score">0</span> <img src="https://cdn-icons-png.flaticon.com/512/732/732165.png" id="ballon-header"></div>
            <div id="aps">+<span id="autoPower">0</span>/s</div>
        </div>
        <div id="gps">
            <div id="admin-link">Joueur: <span id="current-user">...</span></div>
        </div>
    </div>
</header>

<nav>
    <div class="nav-tab active" id="tab-game" onclick="showPage('game')">JEU</div>
    <div class="nav-tab" id="tab-tirs" onclick="showPage('tirs')">TIRS (7)</div>
    <div class="nav-tab" id="tab-team" onclick="showPage('team')">TEAM (7)</div>
    <div class="nav-tab" id="tab-stades" onclick="showPage('stades')">STADES (7)</div>
    <div class="nav-tab" id="tab-mondial" onclick="showPage('mondial')">MONDIAL</div>
</nav>

<div class="page active" id="page-game">
    <div id="basket-court">
        <img id="basket-ball" src="https://cdn-icons-png.flaticon.com/512/732/732165.png" alt="Ballon">
    </div>
</div>

<div class="page shop-container" id="page-tirs">
    </div>

<div class="page shop-container" id="page-team">
    </div>

<div class="page shop-container" id="page-stades">
    </div>

<div class="page" id="page-mondial">
    <div id="admin-panel">
        <div class="admin-box">
            <div class="admin-title">GHOST MODE</div>
            <button class="admin-btn btn-blue" id="btn-ghost" onclick="toggleGhost()">OFF</button>
        </div>

        <div class="admin-box">
            <div class="admin-title">GIVE DISTANCE</div>
            <input type="text" class="admin-input" placeholder="Pseudo Cible...">
            <input type="text" class="admin-input" placeholder="Montant...">
            <button class="admin-btn btn-green">ENVOYER</button>
        </div>

        <div class="admin-box">
            <div class="admin-title">PRIX BOUTIQUE</div>
            <select class="admin-select" id="admin-shop-select" onchange="updateAdminShopIndex()"></select>
            <input type="number" class="admin-input" id="admin-shop-index" placeholder="Index (0-6)">
            <input type="number" class="admin-input" id="admin-shop-price" placeholder="Nouveau Prix">
            <button class="admin-btn btn-yellow" onclick="changeShopPrice()">CHANGER PRIX</button>
        </div>
    </div>
</div>

<script>

    let score = 0;
    let clickPower = 1;

    let multiplier = 1;

    let shopItems = {

        ],
        stades: [

            {id: 1, name: "Gymnase", emoji: "🏫", gain: 1.5, type: "mult", cost: 10000},

        ]
    };

    const scoreElt = document.getElementById('score');
    const autoElt = document.getElementById('autoPower');
    const userElt = document.getElementById('current-user');

    // Démarrer le jeu (photo 7)
    function startGame() {
        const user = document.getElementById('admin-user').value;
        const pass = document.getElementById('admin-pass').value;
        
        // Simule une vérification Admin (à améliorer plus tard)
        if(user === "LouisAdmin" && pass === "1234") {
            userElt.innerText = user;
            document.getElementById('login-screen').style.display = 'none';
            buildShop(); // Construit les boutiques d'origine
            updateUI();
        } else {
            alert("Erreur de connexion Admin.");
        }
    }

    // Gestion de la navigation par onglets
    function showPage(pageName) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        document.getElementById('page-' + pageName).classList.add('active');
        document.getElementById('tab-' + pageName).classList.add('active');
    }

    // Clic sur le ballon
    document.getElementById('basket-ball').addEventListener('click', () => {
        score += clickPower * multiplier;
        updateUI();
    });

    // Boucle automatique d'ORIGINE
    setInterval(() => {
        if (autoPower > 0) {
            score += (autoPower * multiplier) / 10;
            updateUI();
        }
    }, 100); // 10 ticks par seconde

    // Construction dynamique des boutiques (pour réparer le bug de la majuscule !)
    function buildShop() {
        for (const category in shopItems) {
            const container = document.getElementById('page-' + category);
            container.innerHTML = ''; // Vide

                let gainText = "";
                if(item.type === "click") gainText = "+" + item.gain + " pts";
                if(item.type === "auto") gainText = "+" + item.gain + " pts/s";
                if(item.type === "mult") gainText = item.gain + " x";

                const html = `
                    <div class="shop-item cant-buy" id="shop-${category}-${index}">
                        <div class="item-main">
                            <span class="item-emoji">${item.emoji}</span>
                            <div class="item-details">
                                <span class="item-name">${item.name}</span>
                                <span class="item-gain">${gainText}</span>
                            </div>
                        </div>
                        <div class="buy-btn-container" onclick="buyItem('${category}', ${index})">
