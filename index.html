<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Basket Clicker Pro</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Roboto:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --orange: #FF5722; --dark: #1a1a1a; }
        body { 
            margin: 0; background: #2c3e50; color: white; 
            font-family: 'Roboto', sans-serif; text-align: center;
            touch-action: manipulation; overflow-x: hidden;
        }
        #ui { padding: 20px; background: rgba(0,0,0,0.3); }
        h1 { font-family: 'Bungee', cursive; margin: 0; font-size: 24px; color: var(--orange); }
        
        #ball-container { height: 250px; display: flex; align-items: center; justify-content: center; }
        #ball { 
            width: 150px; cursor: pointer; transition: transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        #ball:active { transform: scale(0.9); }

        .shop { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px;
            background: var(--dark); border-top: 4px solid var(--orange);
        }
        .item { 
            background: #333; padding: 10px; border-radius: 8px; 
            border: 2px solid #444; display: flex; flex-direction: column; align-items: center;
        }
        .item.active { border-color: var(--orange); background: #444; }
        .item img { width: 50px; height: 50px; margin-bottom: 5px; }
        .item button { 
            background: var(--orange); border: none; color: white; 
            padding: 5px 10px; border-radius: 5px; font-weight: bold; cursor: pointer;
        }
        .item button:disabled { background: #666; cursor: not-allowed; }
        .stats { font-size: 18px; margin: 10px 0; }
    </style>
</head>
<body>

<div id="ui">
    <h1>BASKET CLICKER</h1>
    <div class="stats">Score: <span id="score">0</span> 🏀</div>
    <div class="stats">Clic: +<span id="clickValue">1</span> | Auto: <span id="autoValue">0</span>/s</div>
</div>

<div id="ball-container">
    <img id="ball" src="https://cdn-icons-png.flaticon.com/512/732/732165.png" alt="BALLON">
</div>

<div class="shop">
    <div class="item" id="upg-click">
        <img src="https://cdn-icons-png.flaticon.com/512/5621/5621351.png" alt="Coach">
        <span>Coach (Clic)</span>
        <button onclick="buyClick()">Prix: <span id="cost-click">10</span></button>
    </div>

    <div class="item" id="upg-auto">
        <img src="https://cdn-icons-png.flaticon.com/512/2313/2313880.png" alt="Joueur">
        <span>Joueur (Auto)</span>
        <button onclick="buyAuto()">Prix: <span id="cost-auto">50</span></button>
    </div>

    <div class="item" id="upg-court">
        <img src="https://cdn-icons-png.flaticon.com/512/2313/2313930.png" alt="Terrain">
        <span>Terrain (x2)</span>
        <button onclick="buyCourt()">Prix: <span id="cost-court">200</span></button>
    </div>
</div>

<script>
    let score = 0;
    let clickValue = 1;
    let autoValue = 0;
    let multiplier = 1;

    let costClick = 10;
    let costAuto = 50;
    let costCourt = 200;

    const scoreElt = document.getElementById('score');
    const ball = document.getElementById('ball');

    // Clic sur le ballon
    ball.addEventListener('click', () => {
        score += clickValue * multiplier;
        updateUI();
    });

    // Auto-click chaque seconde
    setInterval(() => {
        if (autoValue > 0) {
            score += autoValue * multiplier;
            updateUI();
        }
    }, 1000);

    function buyClick() {
        if (score >= costClick) {
            score -= costClick;
            clickValue += 1;
            costClick = Math.round(costClick * 1.5);
            updateUI();
        }
    }

    function buyAuto() {
        if (score >= costAuto) {
            score -= costAuto;
            autoValue += 2;
            costAuto = Math.round(costAuto * 1.6);
            updateUI();
        }
    }

    function buyCourt() {
        if (score >= costCourt) {
            score -= costCourt;
            multiplier += 1;
            costCourt = Math.round(costCourt * 2.5);
            updateUI();
        }
    }

    function updateUI() {
        scoreElt.innerText = Math.floor(score);
        document.getElementById('clickValue').innerText = clickValue * multiplier;
        document.getElementById('autoValue').innerText = autoValue * multiplier;
        
        document.getElementById('cost-click').innerText = costClick;
        document.getElementById('cost-auto').innerText = costAuto;
        document.getElementById('cost-court').innerText = costCourt;

        // Griser les boutons si pas assez d'argent
        document.querySelector('#upg-click button').disabled = (score < costClick);
        document.querySelector('#upg-auto button').disabled = (score < costAuto);
        document.querySelector('#upg-court button').disabled = (score < costCourt);
    }
    
    updateUI(); // Init au démarrage
</script>

</body>
</html>
