<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Basket Clicker - Édition Officielle</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --orange: #FF5722; --black: #121212; --gray: #1e1e1e; }
        body { margin: 0; background-color: var(--black); color: white; font-family: 'Roboto', sans-serif; overflow-x: hidden; }
        
        /* Écran de connexion */
        #login-screen { position: fixed; inset: 0; background: var(--black); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .login-box { background: var(--gray); padding: 30px; border-radius: 15px; border: 3px solid var(--orange); text-align: center; width: 80%; }
        input { padding: 12px; width: 90%; border-radius: 8px; border: none; margin: 15px 0; font-size: 16px; }
        
        /* Jeu */
        header { background: var(--gray); padding: 15px; border-bottom: 4px solid var(--orange); text-align: center; }
        h1 { font-family: 'Bungee', cursive; color: var(--orange); margin: 0; font-size: 22px; }
        #score-display { font-size: 32px; font-weight: bold; margin: 10px 0; color: #fff; }
        
        .main-game { display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #basket-ball { width: 180px; cursor: pointer; transition: transform 0.1s; filter: drop-shadow(0 0 10px rgba(255,87,34,0.3)); }
        #basket-ball:active { transform: scale(0.9); }

        /* Boutique */
        .shop-container { padding: 15px; background: var(--gray); border-radius: 20px 20px 0 0; margin-top: 20px; }
        .shop-title { font-family: 'Bungee', cursive; font-size: 18px; color: var(--orange); margin-bottom: 15px; }
        .item { background: #2a2a2a; padding: 12px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; border-left: 5px solid #444; }
        .item.can-buy { border-left-color: var(--orange); }
        .item img { width: 50px; height: 50px; margin-right: 15px; border-radius: 5px; background: #333; }
        .item-info { flex-grow: 1; }
        .item-name { font-weight: bold; display: block; }
        .item-cost { color: #aaa; font-size: 14px; }
        button.buy-btn { background: var(--orange); border: none; color: white; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        button.buy-btn:disabled { background: #555; opacity: 0.5; }

        .stats-bar { display: flex; justify-content: space-around; background: #252525; padding: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h1>BASKET CLICKER</h1>
        <p>Choisis ton pseudo :</p>
        <input type="text" id="username" placeholder="Pseudo...">
        <button class="buy-btn" onclick="startGame()" style="width: 100%; padding: 15px;">JOUER !</button>
    </div>
</div>

<header>
    <h1>BASKET CLICKER</h1>
    <div id="score-display">0 🏀</div>
</header>

<div class="stats-bar">
    <div>Clic: +<span id="val-click">1</span></div>
    <div>Auto: <span id="val-auto">0</span>/s</div>
</div>

<div class="main-game">
    <img id="basket-ball" src="https://cdn-icons-png.flaticon.com/512/732/732165.png" alt="Ballon">
</div>

<div class="shop-container">
    <div class="shop-title">Boutique & Upgrades</div>
    
    <div class="item" id="item-coach">
        <img src="https://cdn-icons-png.flaticon.com/512/5621/5621351.png">
        <div class="item-info">
            <span class="item-name">Entraîneur (+1/clic)</span>
            <span class="item-cost">Prix: <span id="cost-coach">15</span></span>
        </div>
        <button class="buy-btn" id="btn-coach" onclick="buyUpgrade('coach')">Acheter</button>
    </div>

    <div class="item" id="item-player">
        <img src="https://cdn-icons-png.flaticon.com/512/2313/2313880.png">
        <div class="item-info">
            <span class="item-name">Joueur Pro (+2 auto)</span>
            <span class="item-cost">Prix: <span id="cost-player">100</span></span>
        </div>
        <button class="buy-btn" id="btn-player" onclick="buyUpgrade('player')">Acheter</button>
    </div>

    <div class="item" id="item-court">
        <img src="https://cdn-icons-png.flaticon.com/512/2313/2313930.png">
        <div class="item-info">
            <span class="item-name">Terrain NBA (x2 total)</span>
            <span class="item-cost">Prix: <span id="cost-court">500</span></span>
        </div>
        <button class="buy-btn" id="btn-court" onclick="buyUpgrade('court')">Acheter</button>
    </div>
</div>

<script>
    let score = 0;
    let clickPower = 1;
    let autoPower = 0;
    let multiplier = 1;
    let pseudo = "";

    let prices = { coach: 15, player: 100, court: 500 };

    function startGame() {
        const input = document.getElementById('username');
        if(input.value.trim() !== "") {
            pseudo = input.value;
            document.getElementById('login-screen').style.display = 'none';
            updateDisplay();
        } else { alert("Mets un pseudo !"); }
    }

    // Le clic sur le ballon
    document.getElementById('basket-ball').addEventListener('click', () => {
        score += clickPower * multiplier;
        updateDisplay();
    });

    // Boucle automatique
    setInterval(() => {
        if (autoPower > 0) {
            score += (autoPower * multiplier) / 10;
            updateDisplay();
        }
    }, 100);

    function buyUpgrade(type) {
        if (score >= prices[type]) {
            score -= prices[type];
            
            if (type === 'coach') {
                clickPower += 1;
                prices.coach = Math.round(prices.coach * 1.5);
            } else if (type === 'player') {
                autoPower += 2;
                prices.player = Math.round(prices.player * 1.6);
            } else if (type === 'court') {
                multiplier += 1;
                prices.court = Math.round(prices.court * 3);
            }
            updateDisplay();
        }
    }

    function updateDisplay() {
        document.getElementById('score-display').innerText = Math.floor(score) + " 🏀";
        document.getElementById('val-click').innerText = clickPower * multiplier;
        document.getElementById('val-auto').innerText = (autoPower * multiplier).toFixed(1);
        
        document.getElementById('cost-coach').innerText = prices.coach;
        document.getElementById('cost-player').innerText = prices.player;
        document.getElementById('cost-court').innerText = prices.court;

        // Activer/Désactiver les boutons
        document.getElementById('btn-coach').disabled = (score < prices.coach);
        document.getElementById('btn-player').disabled = (score < prices.player);
        document.getElementById('btn-court').disabled = (score < prices.court);
        
        // Couleur visuelle
        document.getElementById('item-coach').className = score >= prices.coach ? "item can-buy" : "item";
        document.getElementById('item-player').className = score >= prices.player ? "item can-buy" : "item";
        document.getElementById('item-court').className = score >= prices.court ? "item can-buy" : "item";
    }
</script>

</body>
</html>
